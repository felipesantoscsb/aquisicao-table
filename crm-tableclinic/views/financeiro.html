<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financeiro · Table Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--moss:#3D4A35;--moss2:#4E5E42;--terra:#B97040;--cream:#F8F4EE;--brown:#2C2018;--muted:#7A6E64;--line:#DDD4C4;--danger:#C0392B;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--cream);font-family:'Jost',sans-serif;font-weight:300;color:var(--brown);min-height:100vh}

    .topbar{background:var(--moss);color:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;position:sticky;top:0;z-index:100}
    .topbar__brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:500;letter-spacing:.04em}
    .topbar__nav{display:flex;align-items:center;gap:2px}
    .topbar__nav a{color:var(--cream);opacity:.7;font-size:.72rem;text-decoration:none;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:2px}
    .topbar__nav a:hover{opacity:1}
    .topbar__nav a.active{opacity:1;background:rgba(255,255,255,.15)}
    .btn-logout{background:none;border:1px solid rgba(248,244,238,.3);color:var(--cream);cursor:pointer;padding:4px 10px;border-radius:2px;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;margin-left:8px}

    .filters{background:#fff;border-bottom:1px solid var(--line);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:52px;z-index:90}
    .filters select,.filters input{border:1px solid var(--line);border-radius:3px;padding:6px 10px;font-family:'Jost',sans-serif;font-size:.8rem;color:var(--brown);background:var(--cream);outline:none}
    .filters select:focus,.filters input:focus{border-color:var(--moss)}
    .btn-new{background:var(--terra);color:#fff;border:none;border-radius:3px;padding:7px 16px;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-left:auto;white-space:nowrap}
    .btn-new:hover{background:#9E5E30}

    .page{padding:24px 20px;max-width:1100px;margin:0 auto}

    /* Resumo cards */
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
    @media(max-width:600px){.summary{grid-template-columns:1fr}}
    .sum-card{background:#fff;border-radius:4px;padding:18px 20px;border-top:3px solid var(--line)}
    .sum-card--pendente{border-top-color:var(--terra)}
    .sum-card--pago    {border-top-color:var(--moss)}
    .sum-card--vencido {border-top-color:var(--danger)}
    .sum-label{font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .sum-value{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:500}

    table{width:100%;border-collapse:collapse;font-size:.84rem;background:#fff;border-radius:4px;overflow:hidden}
    th{background:var(--moss);color:var(--cream);text-align:left;padding:10px 14px;font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
    td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#faf7f3}

    .badge{display:inline-block;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px}
    .badge-pendente{background:rgba(185,112,64,.15);color:var(--terra)}
    .badge-pago    {background:rgba(61,74,53,.15);color:var(--moss)}
    .badge-vencido {background:rgba(192,57,43,.15);color:var(--danger)}
    .badge-cancelado{background:rgba(0,0,0,.07);color:var(--muted)}

    .btn-sm{font-size:.68rem;padding:3px 9px;border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;border:1px solid var(--line);background:none;color:var(--muted);white-space:nowrap}
    .btn-sm:hover{border-color:var(--moss);color:var(--moss)}
    .btn-sm-pay{border-color:rgba(61,74,53,.4);color:var(--moss)}
    .btn-sm-pay:hover{background:rgba(61,74,53,.1)}
    .empty{text-align:center;color:var(--muted);padding:40px;font-size:.85rem}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(44,32,24,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:4px;width:100%;max-width:500px;box-shadow:0 8px 48px rgba(44,32,24,.18);margin:auto}
    .modal__head{background:var(--moss);color:var(--cream);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-radius:4px 4px 0 0}
    .modal__title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500}
    .modal__close{background:none;border:none;color:var(--cream);font-size:1.4rem;cursor:pointer;opacity:.7;line-height:1}
    .modal__close:hover{opacity:1}
    .modal__body{padding:20px}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    @media(max-width:500px){.fgrid{grid-template-columns:1fr}}
    .field label{display:block;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:3px;padding:7px 10px;font-family:'Jost',sans-serif;font-size:.84rem;color:var(--brown);background:var(--cream);outline:none}
    .field input:focus,.field select:focus{border-color:var(--moss)}
    .modal__actions{padding:14px 20px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
    .btn-save{background:var(--moss);color:var(--cream);border:none;border-radius:3px;padding:9px 18px;font-family:'Jost',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer}
    .btn-save:hover{background:var(--moss2)}
    .btn-cancel-modal{background:none;border:1px solid var(--line);color:var(--muted);border-radius:3px;padding:9px 18px;font-family:'Jost',sans-serif;font-size:.8rem;cursor:pointer}
    .form-err{color:var(--danger);font-size:.78rem;margin-top:6px;display:none}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar__brand">Table Clinic</div>
  <div style="display:flex;align-items:center">
    <nav class="topbar__nav" id="topNav"></nav>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</div>

<div class="filters">
  <select id="fStatus">
    <option value="">Todos os status</option>
    <option value="pendente">Pendente</option>
    <option value="pago">Pago</option>
    <option value="vencido">Vencido</option>
  </select>
  <select id="fMonth">
    <option value="">Todos os meses</option>
  </select>
  <select id="fYear">
    <option value="">Todos os anos</option>
  </select>
  <button class="btn-new" id="btnNew">+ Lançar cobrança</button>
</div>

<div class="page">
  <!-- Resumo -->
  <div class="summary">
    <div class="sum-card sum-card--pendente">
      <div class="sum-label">Pendente</div>
      <div class="sum-value" id="sumPendente">R$ —</div>
    </div>
    <div class="sum-card sum-card--pago">
      <div class="sum-label">Pago</div>
      <div class="sum-value" id="sumPago">R$ —</div>
    </div>
    <div class="sum-card sum-card--vencido">
      <div class="sum-label">Vencido</div>
      <div class="sum-value" id="sumVencido">R$ —</div>
    </div>
  </div>

  <!-- Tabela -->
  <table>
    <thead><tr>
      <th>Paciente</th><th>Pacote</th><th>Valor</th>
      <th>Vencimento</th><th>Status</th><th>Pago em</th><th></th>
    </tr></thead>
    <tbody id="chargesBody"></tbody>
  </table>
</div>

<!-- Modal nova cobrança -->
<div class="overlay" id="overlayNew">
  <div class="modal">
    <div class="modal__head">
      <div class="modal__title">Lançar cobrança</div>
      <button class="modal__close" id="btnCloseNew">×</button>
    </div>
    <div class="modal__body">
      <div class="fgrid">
        <div class="field" style="grid-column:1/-1">
          <label>Paciente *</label>
          <select id="cPatient"><option value="">— selecione —</option></select>
        </div>
        <div class="field">
          <label>Pacote *</label>
          <select id="cPackage">
            <option value="mensal">Mensal</option>
            <option value="bimestral">Bimestral</option>
            <option value="trimestral">Trimestral</option>
            <option value="semestral">Semestral</option>
            <option value="manutenção">Manutenção</option>
            <option value="avulso">Avulso</option>
          </select>
        </div>
        <div class="field">
          <label>Valor (R$)</label>
          <input id="cValue" type="number" step="0.01" min="0" placeholder="890.00"/>
        </div>
        <div class="field">
          <label>Data de emissão</label>
          <input id="cIssue" type="date"/>
        </div>
        <div class="field">
          <label>Vencimento</label>
          <input id="cDue" type="date"/>
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Observações</label>
          <input id="cNotes" type="text" placeholder="Opcional"/>
        </div>
      </div>
      <div class="form-err" id="cErr"></div>
    </div>
    <div class="modal__actions">
      <button class="btn-cancel-modal" id="btnCancelNew">Cancelar</button>
      <button class="btn-save" id="btnSaveNew">Lançar</button>
    </div>
  </div>
</div>

<script>
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

// ── Nav ───────────────────────────────────────────────────────
function buildNav(role) {
  const items = [
    {href:'/pipeline',       label:'Pipeline',       roles:['admin','sdr','nutri','administrativo']},
    {href:'/leads',          label:'Leads',          roles:['admin','sdr','administrativo']},
    {href:'/pacientes',      label:'Pacientes',      roles:['admin','nutri','administrativo']},
    {href:'/agenda-clinica', label:'Agenda Clínica', roles:['admin','nutri','administrativo']},
    {href:'/financeiro',     label:'Financeiro',     roles:['admin','administrativo']},
    {href:'/admin',          label:'Admin',          roles:['admin']},
  ];
  const nav = document.getElementById('topNav');
  items.filter(i=>i.roles.includes(role)).forEach(i=>{
    const a=document.createElement('a'); a.href=i.href; a.textContent=i.label;
    if(location.pathname===i.href) a.classList.add('active');
    nav.appendChild(a);
  });
}

// ── Preenche selects de mês/ano ───────────────────────────────
function populateFilters() {
  const mSel = document.getElementById('fMonth');
  MONTHS_PT.forEach((m,i)=>{
    const opt=document.createElement('option'); opt.value=i+1; opt.textContent=m; mSel.appendChild(opt);
  });
  const ySel = document.getElementById('fYear');
  const yr = new Date().getFullYear();
  for(let y=yr-2;y<=yr+1;y++){
    const opt=document.createElement('option'); opt.value=y; opt.textContent=y;
    if(y===yr) opt.selected=true;
    ySel.appendChild(opt);
  }
}

// ── Formata BRL ───────────────────────────────────────────────
const brl = v => v!=null ? 'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
const dt  = s => s ? new Date(s+'T12:00:00').toLocaleDateString('pt-BR') : '—';

// ── Carregar cobranças ────────────────────────────────────────
async function loadCharges() {
  const params = new URLSearchParams();
  const st = document.getElementById('fStatus').value;
  const mo = document.getElementById('fMonth').value;
  const yr = document.getElementById('fYear').value;
  if (st) params.set('status', st);
  if (mo) params.set('month', mo);
  if (yr) params.set('year', yr);

  const r = await fetch('/api/charges?' + params);
  const j = await r.json();
  const data = j.data || {};
  const rows = data.rows || [];
  const tots = data.totals || {};

  // Resumo
  document.getElementById('sumPendente').textContent = brl(tots.pendente||0);
  document.getElementById('sumPago').textContent     = brl(tots.pago||0);
  document.getElementById('sumVencido').textContent  = brl(tots.vencido||0);

  const tbody = document.getElementById('chargesBody');
  tbody.innerHTML = '';
  if (!rows.length) {
    tbody.innerHTML='<tr><td colspan="7" class="empty">Nenhuma cobrança encontrada</td></tr>';
    return;
  }

  rows.forEach(c=>{
    const tr = document.createElement('tr');
    const bClass = {pendente:'badge-pendente',pago:'badge-pago',vencido:'badge-vencido',cancelado:'badge-cancelado'}[c.status]||'';
    tr.innerHTML=`
      <td><strong>${c.patient_name}</strong>
          ${c.nutri_short?`<br><span style="font-size:.72rem;color:var(--muted)">${c.nutri_short}</span>`:''}</td>
      <td style="font-size:.8rem">${c.package_type}</td>
      <td style="font-family:'Cormorant Garamond',serif;font-size:1rem">${brl(c.value)}</td>
      <td style="font-size:.8rem">${dt(c.due_date)}</td>
      <td><span class="badge ${bClass}">${c.status}</span></td>
      <td style="font-size:.78rem">${c.paid_date?dt(c.paid_date):'—'}</td>
      <td style="white-space:nowrap;display:flex;gap:5px;padding:10px 14px">
        ${c.status==='pendente'?`<button class="btn-sm btn-sm-pay" onclick="pay(${c.id})">✓ Pagar</button>`:''}
        ${c.status!=='cancelado'&&c.status!=='pago'?`<button class="btn-sm" onclick="cancel(${c.id})">✕</button>`:''}
      </td>`;
    tbody.appendChild(tr);
  });
}

async function pay(id) {
  await fetch(`/api/charges/${id}/pay`,{method:'PUT',headers:{'Content-Type':'application/json'},body:'{}'});
  loadCharges();
}
async function cancel(id) {
  if(!confirm('Cancelar esta cobrança?')) return;
  await fetch(`/api/charges/${id}`,{method:'DELETE'});
  loadCharges();
}

// ── Modal nova cobrança ───────────────────────────────────────
document.getElementById('btnNew').addEventListener('click', ()=>{
  document.getElementById('cPatient').value = '';
  document.getElementById('cPackage').value = 'mensal';
  document.getElementById('cValue').value   = '';
  document.getElementById('cIssue').value   = new Date().toISOString().slice(0,10);
  document.getElementById('cDue').value     = '';
  document.getElementById('cNotes').value   = '';
  document.getElementById('cErr').style.display='none';
  document.getElementById('overlayNew').classList.add('open');
});
document.getElementById('btnCloseNew').addEventListener('click', ()=>document.getElementById('overlayNew').classList.remove('open'));
document.getElementById('btnCancelNew').addEventListener('click', ()=>document.getElementById('overlayNew').classList.remove('open'));
document.getElementById('overlayNew').addEventListener('click', e=>{
  if(e.target===document.getElementById('overlayNew')) document.getElementById('overlayNew').classList.remove('open');
});

document.getElementById('btnSaveNew').addEventListener('click', async ()=>{
  const errEl  = document.getElementById('cErr');
  errEl.style.display='none';
  const patient_id   = document.getElementById('cPatient').value;
  const package_type = document.getElementById('cPackage').value;
  if (!patient_id) { errEl.textContent='Selecione um paciente.'; errEl.style.display='block'; return; }
  const btn=document.getElementById('btnSaveNew'); btn.textContent='Lançando…';
  const r = await fetch('/api/charges',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      patient_id,
      package_type,
      value:      parseFloat(document.getElementById('cValue').value)||null,
      issue_date: document.getElementById('cIssue').value||null,
      due_date:   document.getElementById('cDue').value||null,
      notes:      document.getElementById('cNotes').value||null,
    })
  });
  const j = await r.json();
  if(r.ok){
    document.getElementById('overlayNew').classList.remove('open');
    loadCharges();
  } else {
    errEl.textContent=j.error||'Erro ao lançar.'; errEl.style.display='block';
  }
  btn.textContent='Lançar';
});

// ── Filtros ───────────────────────────────────────────────────
['fStatus','fMonth','fYear'].forEach(id=>
  document.getElementById(id).addEventListener('change', loadCharges)
);

document.getElementById('btnLogout').addEventListener('click', async ()=>{
  await fetch('/auth/logout',{method:'POST'}); window.location='/login';
});

// ── Init ──────────────────────────────────────────────────────
(async ()=>{
  const me = await (await fetch('/api/me')).json();
  buildNav(me.role);
  populateFilters();
  document.getElementById('fMonth').value = new Date().getMonth()+1;

  // Pacientes no select
  const pj = await (await fetch('/api/patients')).json();
  const sel = document.getElementById('cPatient');
  (pj.data||[]).forEach(p=>{
    const opt=document.createElement('option'); opt.value=p.id;
    opt.textContent=p.name+(p.nutritionist_short?` (${p.nutritionist_short})`:'');
    sel.appendChild(opt);
  });

  loadCharges();
})();
</script>
</body>
</html>
