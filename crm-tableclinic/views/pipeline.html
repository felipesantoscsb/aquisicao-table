<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pipeline · Table Clinic CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- SortableJS para drag-and-drop com click-and-hold -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <style>
    :root {
      --moss:#3D4A35; --moss2:#4E5E42; --terra:#B97040; --cream:#F8F4EE;
      --warm:#EDE5D8; --brown:#2C2018; --muted:#7A6E64; --line:#DDD4C4;
      --hot:#B97040; --warm-c:#C8972A; --cold:#8A9BA8;
      --juliana:#3D4A35; --natalia:#B97040; --danger:#C0392B;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--cream);font-family:'Jost',sans-serif;font-weight:300;color:var(--brown);min-height:100vh;overflow-x:hidden}

    /* ── TOPBAR ── */
    .topbar{background:var(--moss);color:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;position:sticky;top:0;z-index:200}
    .topbar__brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:500;letter-spacing:.04em}
    .topbar__right{display:flex;align-items:center;gap:12px}
    .topbar__links a{color:var(--cream);opacity:.7;font-size:.75rem;text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:opacity .2s}
    .topbar__links a:hover{opacity:1}
    .topbar__user{font-size:.75rem;opacity:.65}
    .btn-logout{background:none;border:1px solid rgba(248,244,238,.3);color:var(--cream);cursor:pointer;padding:4px 10px;border-radius:2px;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase}

    /* ── TOOLBAR ── */
    .toolbar{background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:52px;z-index:100}
    .view-tabs{display:flex;gap:4px;margin-right:8px}
    .view-tab{padding:5px 14px;border-radius:2px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:none;font-family:'Jost',sans-serif;color:var(--muted);transition:all .2s}
    .view-tab.active{background:var(--moss);color:var(--cream);border-color:var(--moss)}
    .sep{width:1px;height:24px;background:var(--line);margin:0 4px}
    .toolbar select,.toolbar input[type=text],.toolbar input[type=date]{border:1px solid var(--line);border-radius:3px;padding:6px 10px;font-family:'Jost',sans-serif;font-size:.8rem;color:var(--brown);background:var(--cream);outline:none}
    .toolbar select:focus,.toolbar input:focus{border-color:var(--moss)}
    .toolbar input[type=text]{width:200px}
    .funnel-tabs{display:flex;gap:3px}
    .funnel-tab{padding:5px 11px;border-radius:2px;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:none;font-family:'Jost',sans-serif;color:var(--muted);transition:all .2s}
    .funnel-tab.active{background:var(--moss);color:var(--cream);border-color:var(--moss)}
    .btn-new{background:var(--terra);color:#fff;border:none;border-radius:3px;padding:7px 16px;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-left:auto;white-space:nowrap;transition:background .2s}
    .btn-new:hover{background:#9E5E30}

    /* ── KANBAN BOARD ── */
    .board-wrap{overflow-x:auto;padding:16px;min-height:calc(100vh - 104px)}
    .board{display:flex;gap:12px;min-width:max-content;align-items:flex-start}
    .column{background:#fff;border-radius:4px;width:220px;flex-shrink:0;border-top:3px solid var(--line)}
    .column--offer{border-top-color:var(--terra)}
    .column--won{border-top-color:var(--moss)}
    .column--lost{border-top-color:var(--danger)}
    .column__head{padding:10px 12px 8px;border-bottom:1px solid var(--line)}
    .column__title{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .column__count{display:inline-block;background:var(--line);color:var(--muted);font-size:.62rem;padding:1px 6px;border-radius:10px;margin-left:5px}
    .column__body{min-height:60px;padding:7px;display:flex;flex-direction:column;gap:7px}

    /* ── CARD ── */
    .card{background:var(--cream);border-radius:3px;padding:10px 11px 9px;cursor:grab;border-left:3px solid var(--line);transition:box-shadow .15s,transform .1s;user-select:none}
    .card:hover{box-shadow:0 2px 10px rgba(44,32,24,.12);transform:translateY(-1px)}
    .card.sortable-ghost{opacity:.35;background:var(--warm)}
    .card.sortable-drag{box-shadow:0 8px 28px rgba(44,32,24,.22);transform:rotate(1.5deg);cursor:grabbing}
    .card--juliana{border-left-color:var(--juliana)}
    .card--natalia{border-left-color:var(--natalia)}
    .card--overdue{outline:2px solid var(--danger)}
    .card__name{font-size:.86rem;font-weight:500;color:var(--brown);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card__nutri{font-size:.68rem;color:var(--muted);margin-bottom:5px}
    .card__date{font-size:.68rem;color:var(--muted)}
    .card__footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:4px;flex-wrap:wrap}
    .tier-badge{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px}
    .tier-hot{background:var(--hot);color:#fff}
    .tier-warm{background:var(--warm-c);color:#fff}
    .tier-cold{background:var(--cold);color:#fff}
    .product-badge{font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--terra);background:rgba(185,112,64,.12);padding:2px 7px;border-radius:2px}
    .jornada-badge{font-size:.58rem;padding:2px 6px;border-radius:2px;background:rgba(61,74,53,.1);color:var(--moss);text-decoration:none;font-weight:500;white-space:nowrap}
    .jornada-badge:hover{background:rgba(61,74,53,.2)}

    /* ── CALENDÁRIO ── */
    #calView{display:none;padding:16px;max-width:1200px;margin:0 auto}

    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
    .cal-nav-left{display:flex;align-items:center;gap:10px}
    .cal-nav-btn{background:none;border:1px solid var(--line);border-radius:3px;padding:5px 12px;font-family:'Jost',sans-serif;font-size:.85rem;cursor:pointer;color:var(--brown);transition:border-color .2s}
    .cal-nav-btn:hover{border-color:var(--moss);color:var(--moss)}
    .cal-period-label{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:500;color:var(--moss)}

    .cal-view-toggle{display:flex;gap:4px}
    .cal-toggle-btn{padding:5px 14px;border-radius:2px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:none;font-family:'Jost',sans-serif;color:var(--muted);transition:all .2s}
    .cal-toggle-btn.active{background:var(--moss);color:var(--cream);border-color:var(--moss)}

    /* ── SEMANA ── */
    #weekView{overflow-x:auto}
    .week-table{width:100%;border-collapse:collapse;min-width:700px}
    .week-table th{background:var(--moss);color:var(--cream);padding:8px 6px;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;text-align:center;border-right:1px solid rgba(255,255,255,.15)}
    .week-table th:first-child{width:52px;text-align:center}
    .week-table th.today-col{background:var(--terra)}
    .week-slot{border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top;min-height:44px;padding:0}
    .week-slot:last-child{border-right:none}
    .week-slot.today-col{background:#fffbf5}
    .week-time{background:var(--cream);border-right:1px solid var(--line);padding:4px 6px;font-size:.65rem;color:var(--muted);text-align:right;white-space:nowrap;vertical-align:top;width:52px}
    .week-allday{border-bottom:2px solid var(--terra);background:#fff}
    .week-allday td{padding:4px 6px;min-height:32px;vertical-align:top}
    .week-allday .week-time{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
    .slot-cards{display:flex;flex-direction:column;gap:3px;padding:3px}
    .slot-chip{font-size:.65rem;padding:3px 7px;border-radius:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;transition:opacity .15s;display:block}
    .slot-chip:hover{opacity:.85}
    .chip-juliana{background:var(--juliana)}
    .chip-natalia{background:var(--natalia)}
    .chip-hot{outline:2px solid rgba(185,112,64,.7);outline-offset:1px}

    /* ── MÊS ── */
    #monthView{}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:4px;overflow:hidden}
    .cal-dow{background:var(--moss);color:var(--cream);font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 0;text-align:center}
    .cal-day{background:#fff;min-height:90px;padding:6px;vertical-align:top}
    .cal-day--other{background:#f9f6f1;opacity:.6}
    .cal-day--today{background:#fffbf5}
    .cal-day__num{font-size:.72rem;font-weight:500;color:var(--muted);margin-bottom:4px}
    .cal-day--today .cal-day__num{color:var(--terra);font-weight:600}
    .cal-chip{font-size:.65rem;padding:2px 6px;border-radius:2px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;transition:opacity .15s;display:block}
    .cal-chip:hover{opacity:.85}
    .cal-chip--juliana{background:var(--juliana)}
    .cal-chip--natalia{background:var(--natalia)}
    .cal-chip--hot{outline:2px solid var(--hot);outline-offset:1px}

    /* ── MODAL ── */
    .overlay{position:fixed;inset:0;background:rgba(44,32,24,.45);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:4px;width:100%;max-width:680px;box-shadow:0 8px 48px rgba(44,32,24,.18);margin:auto}
    .modal__head{background:var(--moss);color:var(--cream);padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-start;border-radius:4px 4px 0 0}
    .modal__title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:500}
    .modal__sub{font-size:.7rem;opacity:.7;margin-top:2px}
    .modal__close{background:none;border:none;color:var(--cream);font-size:1.4rem;cursor:pointer;opacity:.7;line-height:1;padding:0 4px}
    .modal__close:hover{opacity:1}
    .modal__body{padding:20px 22px}
    .msec{margin-bottom:18px}
    .msec__title{font-size:.62rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--terra);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--line)}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    @media(max-width:500px){.fgrid{grid-template-columns:1fr}}
    .field label{display:block;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:3px;padding:7px 10px;font-family:'Jost',sans-serif;font-size:.84rem;color:var(--brown);background:var(--cream);outline:none;transition:border-color .2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--moss)}
    .field textarea{resize:vertical;min-height:76px}
    .field--ro input,.field--ro textarea{background:#f0ede8;cursor:default}
    .links-box{background:var(--cream);border:1px solid var(--line);border-radius:3px;padding:12px}
    .link-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
    .link-row:last-child{margin-bottom:0}
    .link-label{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);min-width:68px}
    .link-url{font-size:.75rem;color:var(--moss);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-copy{background:none;border:1px solid var(--line);border-radius:2px;padding:3px 9px;font-size:.66rem;cursor:pointer;font-family:'Jost',sans-serif;color:var(--muted);transition:all .2s;white-space:nowrap}
    .btn-copy:hover,.btn-copy.copied{border-color:var(--moss);color:var(--moss);background:rgba(61,74,53,.08)}
    .modal__actions{display:flex;gap:9px;padding:14px 22px 18px;border-top:1px solid var(--line);flex-wrap:wrap;align-items:center}
    .btn-save{background:var(--moss);color:var(--cream);border:none;border-radius:3px;padding:9px 18px;font-family:'Jost',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
    .btn-save:hover{background:var(--moss2)}
    .btn-jornada{background:var(--terra);color:#fff;border:none;border-radius:3px;padding:9px 18px;font-family:'Jost',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .2s}
    .btn-jornada:hover{background:#9E5E30}
    .btn-jornada:disabled{opacity:.5;cursor:default}
    .jornada-url-row{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
    .jornada-url-link{font-size:.75rem;color:var(--moss);text-decoration:underline;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:5px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-col{color:var(--muted);font-size:.75rem;text-align:center;padding:16px 0}
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar__brand">Table Clinic</div>
  <div class="topbar__right">
    <nav class="topbar__links" id="topNav" style="display:flex;gap:4px"></nav>
    <span class="topbar__user" id="userName"></span>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="view-tabs">
    <button class="view-tab active" id="tabKanban">Kanban</button>
    <button class="view-tab" id="tabCal">Calendário</button>
  </div>
  <div class="sep"></div>
  <select id="fNutri">
    <option value="all">Todas as nutris</option>
    <option value="Juliana">Juliana</option>
    <option value="Natalia">Natalia</option>
  </select>
  <input type="date" id="fFrom" title="De"/>
  <input type="date" id="fTo" title="Até"/>
  <input type="text" id="fSearch" placeholder="Buscar nome ou telefone…"/>
  <div class="funnel-tabs">
    <button class="funnel-tab active" data-funnel="">Todos</button>
    <button class="funnel-tab" data-funnel="pre_consulta">Pré-consulta</button>
    <button class="funnel-tab" data-funnel="captacao">Captação</button>
    <button class="funnel-tab" data-funnel="reativacao">Reativação</button>
    <button class="funnel-tab" data-funnel="pos_venda">Pós-venda</button>
  </div>
  <button class="btn-new" id="btnNew">+ Nova Lead</button>
</div>

<!-- KANBAN -->
<div class="board-wrap" id="kanbanView">
  <div class="board" id="board"></div>
</div>

<!-- CALENDÁRIO -->
<div id="calView">
  <div class="cal-header">
    <div class="cal-nav-left">
      <button class="cal-nav-btn" id="calPrev">‹</button>
      <div class="cal-period-label" id="calPeriodLabel"></div>
      <button class="cal-nav-btn" id="calNext">›</button>
    </div>
    <div class="cal-view-toggle">
      <button class="cal-toggle-btn active" id="btnWeekView">Semana</button>
      <button class="cal-toggle-btn" id="btnMonthView">Mês</button>
    </div>
  </div>

  <!-- Visualização semanal -->
  <div id="weekView">
    <div style="overflow-x:auto">
      <table class="week-table" id="weekTable"></table>
    </div>
  </div>

  <!-- Visualização mensal -->
  <div id="monthView" style="display:none">
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- MODAL DETALHES DA LEAD -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal__head">
      <div><div class="modal__title" id="mTitle">—</div><div class="modal__sub" id="mSub"></div></div>
      <button class="modal__close" id="btnClose">×</button>
    </div>
    <div class="modal__body">
      <div class="msec">
        <div class="msec__title">Dados da Lead</div>
        <div class="fgrid">
          <div class="field"><label>Nome</label><input id="mName" type="text"/></div>
          <div class="field"><label>Telefone</label><input id="mPhone" type="text"/></div>
          <div class="field"><label>E-mail</label><input id="mEmail" type="email"/></div>
          <div class="field"><label>Origem</label><input id="mOrigin" type="text"/></div>
          <div class="field"><label>Tier</label>
            <select id="mTier"><option value="">—</option><option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option></select>
          </div>
          <div class="field"><label>Perfil</label>
            <select id="mProfile"><option value="">—</option><option value="E">E</option><option value="R">R</option><option value="S">S</option><option value="A">A</option></select>
          </div>
        </div>
      </div>
      <div class="msec">
        <div class="msec__title">Pipeline</div>
        <div class="fgrid">
          <div class="field"><label>Etapa</label>
            <select id="mStage">
              <option>Agendada</option><option>Confirmada</option><option>Reagendada</option>
              <option>Executada</option><option>Oferta D+0</option><option>Follow Up D+1</option>
              <option>Follow Up D+3</option><option>Follow Up D+7</option>
              <option>Venda Confirmada</option><option>Venda Perdida</option><option>Cancelada</option>
            </select>
          </div>
          <div class="field"><label>Nutri</label>
            <select id="mNutri"><option value="">—</option><option value="Juliana">Juliana</option><option value="Natalia">Natalia</option></select>
          </div>
          <div class="field"><label>Funil</label>
            <select id="mFunnel">
              <option value="pre_consulta">Pré-consulta</option><option value="captacao">Captação</option>
              <option value="reativacao">Reativação</option><option value="pos_venda">Pós-venda</option>
            </select>
          </div>
          <div class="field"><label>Data da pré-consulta</label><input id="mApptDate" type="datetime-local"/></div>
          <div class="field"><label>Produto indicado</label>
            <select id="mProduct"><option value="">—</option><option value="Essential">Essential</option><option value="Premium">Premium</option><option value="Elite">Elite</option></select>
          </div>
          <div class="field"><label>Próxima ação — responsável</label><input id="mNextResp" type="text"/></div>
          <div class="field"><label>Prazo da próxima ação</label><input id="mNextDeadline" type="date"/></div>
          <div class="field" id="lossField" style="display:none"><label>Motivo de perda</label><input id="mLossReason" type="text"/></div>
        </div>
      </div>
      <div class="msec">
        <div class="msec__title">Observações</div>
        <div class="field field--ro" style="margin-bottom:9px"><label>Obs. Formulário (read-only)</label><textarea id="mObsForm" readonly></textarea></div>
        <div class="field"><label>Obs. Nutri</label><textarea id="mObsNutri"></textarea></div>
      </div>
      <div class="msec" id="linksSection">
        <div class="msec__title">Links de Oferta</div>
        <div class="links-box" id="linksBox"></div>
      </div>
    </div>
    <div class="modal__actions">
      <button class="btn-save" id="btnSave">Salvar</button>
      <button class="btn-jornada" id="btnJornada" style="display:none">Gerar Jornada</button>
      <div class="jornada-url-row" id="jornadaUrlRow" style="display:none">
        <span style="font-size:.68rem;color:var(--muted);white-space:nowrap">Jornada:</span>
        <a class="jornada-url-link" id="jornadaUrlLink" href="#" target="_blank">—</a>
        <button class="btn-copy" id="btnCopyJornada">Copiar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOVA LEAD -->
<div class="overlay" id="overlayNew">
  <div class="modal" style="max-width:560px">
    <div class="modal__head">
      <div><div class="modal__title">Nova Lead</div><div class="modal__sub">Pré-consulta</div></div>
      <button class="modal__close" id="btnCloseNew">×</button>
    </div>
    <div class="modal__body">
      <div class="fgrid">
        <div class="field" style="grid-column:1/-1"><label>Nome *</label><input id="nName" type="text" placeholder="Nome completo da lead"/></div>
        <div class="field"><label>Telefone</label><input id="nPhone" type="text" placeholder="(11) 99999-9999"/></div>
        <div class="field"><label>Origem</label>
          <select id="nOrigin">
            <option value="">—</option>
            <option value="Formulário">Formulário</option>
            <option value="Instagram orgânico">Instagram orgânico</option>
            <option value="PR">PR</option>
            <option value="Quiz">Quiz</option>
          </select>
        </div>
        <div class="field"><label>Nutri responsável</label>
          <select id="nNutri"><option value="">—</option><option value="Juliana">Juliana</option><option value="Natalia">Natalia</option></select>
        </div>
        <div class="field"><label>Data da pré-consulta</label><input id="nApptDate" type="datetime-local"/></div>
        <div class="field"><label>Tier</label>
          <select id="nTier"><option value="">—</option><option value="hot">Hot</option><option value="warm">Warm</option><option value="cold">Cold</option></select>
        </div>
        <div class="field"><label>Perfil</label>
          <select id="nProfile"><option value="">—</option><option value="E">E</option><option value="R">R</option><option value="S">S</option><option value="A">A</option></select>
        </div>
        <div class="field"><label>Etapa inicial</label>
          <select id="nStage">
            <option>Agendada</option><option>Confirmada</option><option>Reagendada</option>
            <option>Executada</option><option>Oferta D+0</option><option>Follow Up D+1</option>
            <option>Follow Up D+3</option><option>Follow Up D+7</option>
            <option>Venda Confirmada</option><option>Venda Perdida</option><option>Cancelada</option>
          </select>
        </div>
        <div class="field" style="grid-column:1/-1"><label>Obs. Formulário</label>
          <textarea id="nObsForm" placeholder="Copie aqui o formulário preenchido — se presente, a jornada será gerada automaticamente"></textarea>
        </div>
      </div>
      <div id="newErr" style="color:var(--danger);font-size:.8rem;margin-top:8px;display:none"></div>
    </div>
    <div class="modal__actions">
      <button class="btn-save" id="btnSaveNew">Salvar lead</button>
      <button class="btn-copy" style="padding:9px 16px" id="btnCancelNew">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════════════
const STAGES = ['Agendada','Confirmada','Reagendada','Executada',
  'Oferta D+0','Follow Up D+1','Follow Up D+3','Follow Up D+7',
  'Venda Confirmada','Venda Perdida','Cancelada'];
const OFFER_STAGES = ['Oferta D+0','Follow Up D+1','Follow Up D+3','Follow Up D+7','Venda Confirmada'];
const STAGE_COLOR  = {
  'Oferta D+0':'--offer','Follow Up D+1':'--offer','Follow Up D+3':'--offer',
  'Follow Up D+7':'--offer','Venda Confirmada':'--won','Venda Perdida':'--lost','Cancelada':'--lost'
};
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// ═══════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════
let cards       = [];
let currentCard = null;
let filters     = { nutri:'all', funnel:'', search:'', from:'', to:'' };
let calDate     = new Date();
let calMode     = 'week'; // 'week' | 'month'

// ═══════════════════════════════════════════════════════════════
// LOAD & RENDER KANBAN
// ═══════════════════════════════════════════════════════════════
async function loadCards() {
  const p = new URLSearchParams();
  if (filters.nutri !== 'all') p.set('nutri', filters.nutri);
  if (filters.funnel) p.set('funnel', filters.funnel);
  if (filters.search) p.set('search', filters.search);
  if (filters.from)   p.set('date_from', filters.from);
  if (filters.to)     p.set('date_to', filters.to);
  const r = await fetch('/api/pipeline/cards?' + p);
  cards = await r.json();
  renderBoard();
  if (calMode === 'week')  renderWeek();
  else                     renderMonth();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  STAGES.forEach(stage => {
    const sc  = cards.filter(c => c.stage === stage);
    const cls = STAGE_COLOR[stage] ? ` column${STAGE_COLOR[stage]}` : '';
    const col = document.createElement('div');
    col.className = 'column' + cls;
    col.innerHTML = `
      <div class="column__head">
        <span class="column__title">${stage}</span>
        <span class="column__count">${sc.length}</span>
      </div>
      <div class="column__body" data-stage="${stage}"></div>`;
    const body = col.querySelector('.column__body');
    sc.forEach(c => body.appendChild(buildCard(c)));
    board.appendChild(col);

    // SortableJS: drag-and-drop com click-and-hold (delay 150ms)
    Sortable.create(body, {
      group:    'kanban-cards',
      animation: 180,
      delay:    150,         // click-and-hold: segurar 150ms antes de arrastar
      delayOnTouchOnly: false,
      ghostClass: 'sortable-ghost',
      dragClass:  'sortable-drag',
      onEnd: async evt => {
        const id       = evt.item.dataset.id;
        const newStage = evt.to.dataset.stage;
        if (!id || !newStage) return;
        await fetch(`/api/pipeline/cards/${id}`, {
          method:  'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ stage: newStage }),
        });
        loadCards();
      },
    });
  });
}

function buildCard(c) {
  const el    = document.createElement('div');
  const nutriC  = c.nutri ? `card--${c.nutri.toLowerCase()}` : '';
  const overdue = c.next_action_deadline && new Date(c.next_action_deadline) < new Date() ? 'card--overdue' : '';
  el.className = `card ${nutriC} ${overdue}`.trim();
  el.dataset.id = c.id;

  // Jornada badge no card
  const jornadaBadge = c.jornada_slug
    ? `<a class="jornada-badge" href="/jornada/${c.jornada_slug}" target="_blank"
         onclick="event.stopPropagation()">📋 Jornada</a>`
    : '';

  el.innerHTML = `
    <div class="card__name" title="${c.lead_name}">${c.lead_name}</div>
    <div class="card__nutri">${c.nutri || '—'}</div>
    <div class="card__date">${c.appointment_date ? fmtDate(c.appointment_date) : '—'}</div>
    <div class="card__footer">
      ${c.tier ? `<span class="tier-badge tier-${c.tier}">${c.tier}</span>` : '<span></span>'}
      ${c.product_indicated ? `<span class="product-badge">${c.product_indicated}</span>` : ''}
      ${jornadaBadge}
    </div>`;
  el.addEventListener('click', () => openModal(c.id));
  return el;
}

// ═══════════════════════════════════════════════════════════════
// CALENDÁRIO — SEMANA
// ═══════════════════════════════════════════════════════════════
function getWeekDays(ref) {
  // Segunda como primeiro dia da semana
  const day = ref.getDay(); // 0=dom
  const monday = new Date(ref);
  monday.setDate(ref.getDate() - ((day + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth()    === b.getMonth()
      && a.getDate()     === b.getDate();
}

function renderWeek() {
  const days   = getWeekDays(calDate);
  const today  = new Date();
  const table  = document.getElementById('weekTable');

  // Label do período
  const first  = days[0], last = days[6];
  const sameMonth = first.getMonth() === last.getMonth();
  document.getElementById('calPeriodLabel').textContent = sameMonth
    ? `${first.getDate()}–${last.getDate()} de ${MONTHS_PT[first.getMonth()]} ${first.getFullYear()}`
    : `${first.getDate()} ${MONTHS_PT[first.getMonth()]} – ${last.getDate()} ${MONTHS_PT[last.getMonth()]} ${last.getFullYear()}`;

  // Monta tabela
  let html = '<thead><tr><th style="width:52px"></th>';
  days.forEach(d => {
    const isToday = isSameDay(d, today);
    html += `<th class="${isToday ? 'today-col' : ''}">${DAYS_PT[d.getDay()]} ${d.getDate()}</th>`;
  });
  html += '</tr></thead><tbody>';

  // Linha "Dia todo" para appointments
  html += '<tr class="week-allday"><td class="week-time">Agenda</td>';
  days.forEach(d => {
    const dayStr  = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayCards = cards.filter(c => c.appointment_date && c.appointment_date.substring(0,10) === dayStr);
    const isToday  = isSameDay(d, today);
    html += `<td class="week-slot ${isToday ? 'today-col' : ''}"><div class="slot-cards">`;
    dayCards.forEach(c => {
      const nutriC = c.nutri ? `chip-${c.nutri.toLowerCase()}` : 'chip-juliana';
      const hotC   = c.tier === 'hot' ? ' chip-hot' : '';
      html += `<span class="slot-chip ${nutriC}${hotC}" onclick="openModal(${c.id})"
                  title="${c.lead_name} — ${c.stage}">${c.lead_name.split(' ')[0]}</span>`;
    });
    html += '</div></td>';
  });
  html += '</tr>';

  // Linhas horárias (7h–21h)
  for (let h = 7; h <= 21; h++) {
    const timeLabel = `${String(h).padStart(2,'0')}:00`;
    html += `<tr>`;
    html += `<td class="week-time">${timeLabel}</td>`;
    days.forEach(d => {
      const isToday = isSameDay(d, today);
      html += `<td class="week-slot ${isToday ? 'today-col' : ''}"></td>`;
    });
    html += '</tr>';
  }
  html += '</tbody>';
  table.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// CALENDÁRIO — MÊS
// ═══════════════════════════════════════════════════════════════
function renderMonth() {
  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  document.getElementById('calPeriodLabel').textContent = `${MONTHS_PT[month]} ${year}`;

  const grid  = document.getElementById('calGrid');
  grid.innerHTML = '';

  DAYS_PT.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-dow';
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDow     = new Date(year, month, 1).getDay();
  const daysInMonth  = new Date(year, month + 1, 0).getDate();
  const today        = new Date();

  // Células vazias antes do dia 1
  for (let i = 0; i < firstDow; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day cal-day--other';
    grid.appendChild(d);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell    = document.createElement('div');
    const isToday = isSameDay(new Date(year, month, d), today);
    cell.className = 'cal-day' + (isToday ? ' cal-day--today' : '');
    cell.innerHTML = `<div class="cal-day__num">${d}</div>`;

    const dayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cards.filter(c => c.appointment_date && c.appointment_date.substring(0,10) === dayStr).forEach(c => {
      const chip  = document.createElement('div');
      const nutriC = c.nutri ? `cal-chip--${c.nutri.toLowerCase()}` : 'cal-chip--juliana';
      const hotC   = c.tier === 'hot' ? ' cal-chip--hot' : '';
      chip.className = `cal-chip ${nutriC}${hotC}`;
      chip.title = `${c.lead_name} — ${c.nutri || '—'} — ${c.stage}`;
      chip.textContent = c.lead_name.split(' ')[0];
      chip.addEventListener('click', () => openModal(c.id));
      cell.appendChild(chip);
    });
    grid.appendChild(cell);
  }

  // Células extras no final
  const total = firstDow + daysInMonth;
  const rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < rem; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day cal-day--other';
    grid.appendChild(d);
  }
}

// ═══════════════════════════════════════════════════════════════
// CONTROLES DO CALENDÁRIO
// ═══════════════════════════════════════════════════════════════
function renderCal() {
  if (calMode === 'week') renderWeek();
  else                    renderMonth();
}

document.getElementById('calPrev').addEventListener('click', () => {
  if (calMode === 'week') calDate = new Date(calDate.getFullYear(), calDate.getMonth(), calDate.getDate() - 7);
  else                    calDate = new Date(calDate.getFullYear(), calDate.getMonth() - 1, 1);
  renderCal();
});
document.getElementById('calNext').addEventListener('click', () => {
  if (calMode === 'week') calDate = new Date(calDate.getFullYear(), calDate.getMonth(), calDate.getDate() + 7);
  else                    calDate = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 1);
  renderCal();
});

document.getElementById('btnWeekView').addEventListener('click', () => {
  calMode = 'week';
  document.getElementById('weekView').style.display  = '';
  document.getElementById('monthView').style.display = 'none';
  document.getElementById('btnWeekView').classList.add('active');
  document.getElementById('btnMonthView').classList.remove('active');
  renderWeek();
});
document.getElementById('btnMonthView').addEventListener('click', () => {
  calMode = 'month';
  document.getElementById('weekView').style.display  = 'none';
  document.getElementById('monthView').style.display = '';
  document.getElementById('btnWeekView').classList.remove('active');
  document.getElementById('btnMonthView').classList.add('active');
  renderMonth();
});

// ═══════════════════════════════════════════════════════════════
// VIEW TOGGLE (Kanban / Calendário)
// ═══════════════════════════════════════════════════════════════
document.getElementById('tabKanban').addEventListener('click', () => {
  document.getElementById('kanbanView').style.display = 'block';
  document.getElementById('calView').style.display    = 'none';
  document.getElementById('tabKanban').classList.add('active');
  document.getElementById('tabCal').classList.remove('active');
});
document.getElementById('tabCal').addEventListener('click', () => {
  document.getElementById('kanbanView').style.display = 'none';
  document.getElementById('calView').style.display    = 'block';
  document.getElementById('tabKanban').classList.remove('active');
  document.getElementById('tabCal').classList.add('active');
  renderCal();
});

// ═══════════════════════════════════════════════════════════════
// MODAL DETALHES
// ═══════════════════════════════════════════════════════════════
async function openModal(id) {
  const r = await fetch(`/api/pipeline/cards/${id}`);
  currentCard = await r.json();
  const c = currentCard;
  document.getElementById('mTitle').textContent = c.lead_name;
  document.getElementById('mSub').textContent   = `${c.stage} · ${c.nutri||'—'} · ${c.funnel||'—'}`;
  document.getElementById('mName').value    = c.lead_name||'';
  document.getElementById('mPhone').value   = c.phone||'';
  document.getElementById('mEmail').value   = c.email||'';
  document.getElementById('mOrigin').value  = c.origin||'';
  document.getElementById('mTier').value    = c.tier||'';
  document.getElementById('mProfile').value = c.profile||'';
  document.getElementById('mStage').value   = c.stage||'Agendada';
  document.getElementById('mNutri').value   = c.nutri||'';
  document.getElementById('mFunnel').value  = c.funnel||'pre_consulta';
  document.getElementById('mApptDate').value     = c.appointment_date ? c.appointment_date.substring(0,16) : '';
  document.getElementById('mProduct').value      = c.product_indicated||'';
  document.getElementById('mNextResp').value     = c.next_action_responsible||'';
  document.getElementById('mNextDeadline').value = c.next_action_deadline ? c.next_action_deadline.substring(0,10) : '';
  document.getElementById('mLossReason').value   = c.loss_reason||'';
  document.getElementById('mObsForm').value      = c.obs_form||'';
  document.getElementById('mObsNutri').value     = c.obs_nutri||'';
  document.getElementById('lossField').style.display = c.stage === 'Venda Perdida' ? '' : 'none';
  renderLinks(c);
  // Bug 1: mostra botão Gerar Jornada quando obs_form presente OU em etapa de oferta
  document.getElementById('btnJornada').style.display =
    (c.obs_form && c.obs_form.trim()) || OFFER_STAGES.includes(c.stage) ? '' : 'none';
  const urlRow = document.getElementById('jornadaUrlRow');
  if (c.plan_url) {
    urlRow.style.display = '';
    document.getElementById('jornadaUrlLink').href        = c.plan_url;
    document.getElementById('jornadaUrlLink').textContent = c.plan_url;
  } else {
    urlRow.style.display = 'none';
  }
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('mStage').addEventListener('change', function() {
  document.getElementById('lossField').style.display = this.value === 'Venda Perdida' ? '' : 'none';
});

function renderLinks(c) {
  const nutriKey = c.nutri && c.nutri.toLowerCase().startsWith('nat') ? 'nati' : 'ju';
  const isPR     = (c.origin||'').toLowerCase().includes('pr');
  const products = ['essential','premium','elite'];
  document.getElementById('linksBox').innerHTML = products.map(p => {
    const url = isPR
      ? `https://www.evelynliu.com.br/oferta-${p}-pr-${nutriKey}`
      : `https://www.evelynliu.com.br/oferta-${p}-${nutriKey}`;
    return `<div class="link-row">
      <span class="link-label">${p[0].toUpperCase()+p.slice(1)}</span>
      <span class="link-url" title="${url}">${url}</span>
      <button class="btn-copy" onclick="copyText('${url}',this)">Copiar</button>
    </div>`;
  }).join('');
}

document.getElementById('btnClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open'); currentCard = null;
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
});

document.getElementById('btnSave').addEventListener('click', async () => {
  if (!currentCard) return;
  const btn = document.getElementById('btnSave');
  btn.textContent = 'Salvando…';
  try {
    await fetch(`/api/leads/${currentCard.lead_id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name:    document.getElementById('mName').value,
        phone:   document.getElementById('mPhone').value,
        email:   document.getElementById('mEmail').value,
        origin:  document.getElementById('mOrigin').value,
        tier:    document.getElementById('mTier').value||null,
        profile: document.getElementById('mProfile').value||null,
      })
    });
    const apptRaw = document.getElementById('mApptDate').value;
    await fetch(`/api/pipeline/cards/${currentCard.id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        stage:    document.getElementById('mStage').value,
        nutri:    document.getElementById('mNutri').value||null,
        funnel:   document.getElementById('mFunnel').value,
        appointment_date: apptRaw || null,
        product_indicated: document.getElementById('mProduct').value||null,
        next_action_responsible: document.getElementById('mNextResp').value||null,
        next_action_deadline:    document.getElementById('mNextDeadline').value||null,
        loss_reason: document.getElementById('mLossReason').value||null,
        obs_nutri:   document.getElementById('mObsNutri').value||null,
      })
    });
    btn.textContent = 'Salvo!';
    setTimeout(() => { btn.textContent = 'Salvar'; }, 1200);
    loadCards();
  } catch { btn.textContent = 'Erro'; setTimeout(() => { btn.textContent = 'Salvar'; }, 2000); }
});

document.getElementById('btnJornada').addEventListener('click', async () => {
  if (!currentCard) return;
  const btn = document.getElementById('btnJornada');
  btn.innerHTML = '<span class="spinner"></span> Gerando…';
  btn.disabled  = true;
  try {
    const r    = await fetch('/api/generate-jornada', {
      method:'POST', headers:{'Content-Type':'application/json'},
      // force:true permite gerar em qualquer etapa (não só Oferta D+0)
      body: JSON.stringify({ card_id: currentCard.id, force: true })
    });
    const data = await r.json();
    if (r.ok) {
      const row = document.getElementById('jornadaUrlRow');
      row.style.display = '';
      document.getElementById('jornadaUrlLink').href        = data.url;
      document.getElementById('jornadaUrlLink').textContent = data.url;
      currentCard.plan_url = data.url;
      loadCards();
    } else { alert('Erro: ' + (data.error || 'Falha ao gerar jornada')); }
  } catch { alert('Erro de conexão'); }
  btn.innerHTML = 'Gerar Jornada'; btn.disabled = false;
});

document.getElementById('btnCopyJornada').addEventListener('click', () => {
  copyText(document.getElementById('jornadaUrlLink').href, document.getElementById('btnCopyJornada'));
});

// ═══════════════════════════════════════════════════════════════
// MODAL NOVA LEAD
// ═══════════════════════════════════════════════════════════════
document.getElementById('btnNew').addEventListener('click', () => {
  ['nName','nPhone','nObsForm'].forEach(id => document.getElementById(id).value = '');
  ['nOrigin','nNutri','nTier','nProfile'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nStage').value   = 'Agendada';
  document.getElementById('nApptDate').value = '';
  document.getElementById('newErr').style.display = 'none';
  document.getElementById('overlayNew').classList.add('open');
});
document.getElementById('btnCloseNew').addEventListener('click', () => document.getElementById('overlayNew').classList.remove('open'));
document.getElementById('btnCancelNew').addEventListener('click', () => document.getElementById('overlayNew').classList.remove('open'));
document.getElementById('overlayNew').addEventListener('click', e => {
  if (e.target === document.getElementById('overlayNew')) document.getElementById('overlayNew').classList.remove('open');
});

document.getElementById('btnSaveNew').addEventListener('click', async () => {
  const name  = document.getElementById('nName').value.trim();
  const errEl = document.getElementById('newErr');
  if (!name) { errEl.textContent = 'Nome é obrigatório.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  const btn = document.getElementById('btnSaveNew');
  btn.textContent = 'Salvando…';
  try {
    const lr = await fetch('/api/leads', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name,
        phone:   document.getElementById('nPhone').value||null,
        origin:  document.getElementById('nOrigin').value||null,
        tier:    document.getElementById('nTier').value||null,
        profile: document.getElementById('nProfile').value||null,
      })
    });
    const lead = await lr.json();
    if (!lr.ok) throw new Error(lead.error||'Erro ao criar lead');

    const apptRaw = document.getElementById('nApptDate').value;
    const obsForm = document.getElementById('nObsForm').value;
    const cr = await fetch('/api/pipeline/cards', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        lead_id: lead.id,
        funnel:  'pre_consulta',
        nutri:   document.getElementById('nNutri').value||null,
        stage:   document.getElementById('nStage').value,
        appointment_date: apptRaw || null,
        obs_form: obsForm||null,
      })
    });
    if (!cr.ok) throw new Error('Erro ao criar card');

    document.getElementById('overlayNew').classList.remove('open');
    await loadCards();
  } catch(err) {
    errEl.textContent = err.message; errEl.style.display = 'block';
  }
  btn.textContent = 'Salvar lead';
});

// ═══════════════════════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════════════════════
let searchTimer;
document.getElementById('fNutri').addEventListener('change', e => { filters.nutri=e.target.value; loadCards(); });
document.getElementById('fFrom').addEventListener('change',  e => { filters.from=e.target.value; loadCards(); });
document.getElementById('fTo').addEventListener('change',    e => { filters.to=e.target.value;   loadCards(); });
document.getElementById('fSearch').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { filters.search = e.target.value; loadCards(); }, 350);
});
document.querySelectorAll('.funnel-tab').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.funnel-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filters.funnel = btn.dataset.funnel;
  loadCards();
}));

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function fmtDate(d) {
  if (!d) return '—';
  // Bug 2: appointment_date agora é TIMESTAMPTZ — parse direto sem concatenar T12:00
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copiado!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  });
}

document.getElementById('btnLogout').addEventListener('click', async () => {
  await fetch('/auth/logout', { method:'POST' });
  window.location.href = '/login';
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
(async () => {
  const me = await (await fetch('/api/me')).json();
  document.getElementById('userName').textContent = me.name;
  buildNav(me.role);
  loadCards();
})();

function buildNav(role) {
  const items = [
    { href:'/pipeline',       label:'Pipeline',       roles:['admin','sdr','nutri','administrativo'] },
    { href:'/leads',          label:'Leads',          roles:['admin','sdr','administrativo'] },
    { href:'/pacientes',      label:'Pacientes',      roles:['admin','nutri','administrativo'] },
    { href:'/agenda-clinica', label:'Agenda Clínica', roles:['admin','nutri','administrativo'] },
    { href:'/financeiro',     label:'Financeiro',     roles:['admin','administrativo'] },
    { href:'/admin',          label:'Admin',          roles:['admin'] },
  ];
  const nav = document.getElementById('topNav');
  items.filter(i => i.roles.includes(role)).forEach(i => {
    const a = document.createElement('a');
    a.href = i.href; a.textContent = i.label;
    if (location.pathname === i.href) a.style.opacity = '1';
    nav.appendChild(a);
  });
}
</script>
