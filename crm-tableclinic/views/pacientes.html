<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pacientes · Table Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--moss:#3D4A35;--moss2:#4E5E42;--terra:#B97040;--cream:#F8F4EE;--brown:#2C2018;--muted:#7A6E64;--line:#DDD4C4;--danger:#C0392B;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--cream);font-family:'Jost',sans-serif;font-weight:300;color:var(--brown);min-height:100vh}
    .topbar{background:var(--moss);color:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;position:sticky;top:0;z-index:100}
    .topbar__brand{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:500;letter-spacing:.04em}
    .topbar__nav{display:flex;align-items:center;gap:4px}
    .topbar__nav a,.topbar__nav span{color:var(--cream);opacity:.7;font-size:.72rem;text-decoration:none;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:2px;transition:opacity .15s}
    .topbar__nav a:hover{opacity:1}
    .topbar__nav a.active{opacity:1;background:rgba(255,255,255,.15)}
    .btn-logout{background:none;border:1px solid rgba(248,244,238,.3);color:var(--cream);cursor:pointer;padding:4px 10px;border-radius:2px;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;margin-left:8px}

    .filters{background:#fff;border-bottom:1px solid var(--line);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:52px;z-index:90}
    .filters select,.filters input{border:1px solid var(--line);border-radius:3px;padding:6px 10px;font-family:'Jost',sans-serif;font-size:.82rem;color:var(--brown);background:var(--cream);outline:none}
    .filters input[type=text]{width:220px}
    .filters select:focus,.filters input:focus{border-color:var(--moss)}
    .btn-new{background:var(--terra);color:#fff;border:none;border-radius:3px;padding:7px 16px;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-left:auto;white-space:nowrap}
    .btn-new:hover{background:#9E5E30}

    .page{padding:24px 20px;max-width:1200px;margin:0 auto}
    .page h1{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:500;color:var(--moss);margin-bottom:16px}

    table{width:100%;border-collapse:collapse;font-size:.84rem;background:#fff;border-radius:4px;overflow:hidden}
    th{background:var(--moss);color:var(--cream);text-align:left;padding:10px 14px;font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
    td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#faf7f3;cursor:pointer}

    .badge{display:inline-block;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:2px}
    .badge-ativo{background:rgba(61,74,53,.15);color:var(--moss)}
    .badge-manutencao{background:rgba(200,151,42,.15);color:#9a7010}
    .badge-alta{background:rgba(138,155,168,.2);color:#4a6373}
    .badge-inativo{background:rgba(0,0,0,.08);color:var(--muted)}

    .link{color:var(--moss);text-decoration:underline;font-size:.75rem}
    .btn-sm{font-size:.68rem;padding:3px 9px;border-radius:2px;cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line);background:none;color:var(--muted);white-space:nowrap}
    .btn-sm:hover{border-color:var(--moss);color:var(--moss)}
    .empty{text-align:center;color:var(--muted);padding:40px;font-size:.85rem}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(44,32,24,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:4px;width:100%;max-width:600px;box-shadow:0 8px 48px rgba(44,32,24,.18);margin:auto}
    .modal__head{background:var(--moss);color:var(--cream);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-radius:4px 4px 0 0}
    .modal__title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500}
    .modal__close{background:none;border:none;color:var(--cream);font-size:1.4rem;cursor:pointer;opacity:.7;line-height:1}
    .modal__close:hover{opacity:1}
    .modal__body{padding:20px}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    @media(max-width:500px){.fgrid{grid-template-columns:1fr}}
    .field label{display:block;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
    .field input,.field select{width:100%;border:1px solid var(--line);border-radius:3px;padding:7px 10px;font-family:'Jost',sans-serif;font-size:.84rem;color:var(--brown);background:var(--cream);outline:none}
    .field input:focus,.field select:focus{border-color:var(--moss)}
    .modal__actions{padding:14px 20px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
    .btn-save{background:var(--moss);color:var(--cream);border:none;border-radius:3px;padding:9px 18px;font-family:'Jost',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer}
    .btn-save:hover{background:var(--moss2)}
    .btn-cancel{background:none;border:1px solid var(--line);color:var(--muted);border-radius:3px;padding:9px 18px;font-family:'Jost',sans-serif;font-size:.8rem;cursor:pointer}
    .form-err{color:var(--danger);font-size:.78rem;margin-top:6px;display:none}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar__brand">Table Clinic</div>
  <div style="display:flex;align-items:center">
    <nav class="topbar__nav" id="topNav"></nav>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</div>

<div class="filters">
  <input type="text" id="fSearch" placeholder="Buscar nome…"/>
  <select id="fNutri"><option value="">Todas as nutris</option></select>
  <select id="fStatus">
    <option value="">Todos os status</option>
    <option value="ativo">Ativo</option>
    <option value="manutenção">Manutenção</option>
    <option value="alta">Alta</option>
    <option value="inativo">Inativo</option>
  </select>
  <select id="fProduct">
    <option value="">Todos os produtos</option>
    <option value="Table Elite">Table Elite</option>
    <option value="Table Premium">Table Premium</option>
    <option value="Table Essential">Table Essential</option>
  </select>
  <button class="btn-new" id="btnNew">+ Cadastrar paciente</button>
</div>

<div class="page">
  <table>
    <thead><tr>
      <th>Nome</th><th>Nutri</th><th>Status</th><th>Produto</th>
      <th>Início</th><th>Jornada</th><th></th>
    </tr></thead>
    <tbody id="patientsBody"></tbody>
  </table>
</div>

<!-- Modal cadastro -->
<div class="overlay" id="overlayNew">
  <div class="modal">
    <div class="modal__head">
      <div class="modal__title">Cadastrar paciente</div>
      <button class="modal__close" id="btnCloseNew">×</button>
    </div>
    <div class="modal__body">
      <div class="fgrid">
        <div class="field" style="grid-column:1/-1"><label>Nome *</label><input id="pName" type="text"/></div>
        <div class="field"><label>E-mail</label><input id="pEmail" type="email"/></div>
        <div class="field"><label>Telefone</label><input id="pPhone" type="text"/></div>
        <div class="field"><label>Data de nascimento</label><input id="pBirthday" type="date"/></div>
        <div class="field"><label>Data de início</label><input id="pStartDate" type="date"/></div>
        <div class="field"><label>Nutri responsável</label>
          <select id="pNutri"><option value="">—</option></select></div>
        <div class="field"><label>Status clínico</label>
          <select id="pStatus">
            <option value="ativo">Ativo</option>
            <option value="manutenção">Manutenção</option>
            <option value="alta">Alta</option>
          </select></div>
        <div class="field"><label>Produto</label>
          <select id="pProduct">
            <option value="Table Elite">Table Elite</option>
            <option value="Table Premium">Table Premium</option>
            <option value="Table Essential">Table Essential</option>
          </select></div>
        <div class="field" style="grid-column:1/-1"><label>Link WebDiet</label><input id="pWebdiet" type="text" placeholder="https://..."/></div>
      </div>
      <div class="form-err" id="pErr"></div>
    </div>
    <div class="modal__actions">
      <button class="btn-cancel" id="btnCancelNew">Cancelar</button>
      <button class="btn-save" id="btnSaveNew">Salvar</button>
    </div>
  </div>
</div>

<script>
let me = {};
let allNutris = [];
let timer;

// ── Nav por role ──────────────────────────────────────────────
function buildNav(role) {
  const items = [
    { href:'/pipeline',      label:'Pipeline',       roles:['admin','sdr','nutri','administrativo'] },
    { href:'/leads',         label:'Leads',          roles:['admin','sdr','administrativo'] },
    { href:'/pacientes',     label:'Pacientes',      roles:['admin','nutri','administrativo'] },
    { href:'/agenda-clinica',label:'Agenda Clínica', roles:['admin','nutri','administrativo'] },
    { href:'/financeiro',    label:'Financeiro',     roles:['admin','administrativo'] },
    { href:'/admin',         label:'Admin',          roles:['admin'] },
  ];
  const nav = document.getElementById('topNav');
  items.filter(i => i.roles.includes(role)).forEach(i => {
    const a = document.createElement('a');
    a.href = i.href; a.textContent = i.label;
    if (location.pathname.startsWith(i.href) && i.href !== '/') a.classList.add('active');
    nav.appendChild(a);
  });
}

// ── Load nutris ───────────────────────────────────────────────
async function loadNutris() {
  const r = await fetch('/api/admin/users');
  const users = await r.json();
  allNutris = users.filter(u => u.role === 'nutri' || u.role === 'admin');
  const sel1 = document.getElementById('fNutri');
  const sel2 = document.getElementById('pNutri');
  allNutris.forEach(u => {
    [sel1,sel2].forEach(s => {
      const opt = document.createElement('option');
      opt.value = u.id; opt.textContent = u.name;
      s.appendChild(opt);
    });
  });
}

// ── Load patients ─────────────────────────────────────────────
async function loadPatients() {
  const params = new URLSearchParams();
  const s = document.getElementById('fSearch').value;
  const n = document.getElementById('fNutri').value;
  const st= document.getElementById('fStatus').value;
  const p = document.getElementById('fProduct').value;
  if (s)  params.set('search', s);
  if (n)  params.set('nutritionist_id', n);
  if (st) params.set('clinical_status', st);
  if (p)  params.set('product', p);
  if (st === 'inativo') params.set('include_inactive', '1');

  const r    = await fetch('/api/patients?' + params);
  const json = await r.json();
  const rows = json.data || [];

  const tbody = document.getElementById('patientsBody');
  tbody.innerHTML = '';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Nenhum paciente encontrado</td></tr>';
    return;
  }
  rows.forEach(p => {
    const tr = document.createElement('tr');
    const statusCls = { ativo:'badge-ativo', manutenção:'badge-manutencao', alta:'badge-alta', inativo:'badge-inativo' }[p.clinical_status] || '';
    tr.innerHTML = `
      <td><strong style="font-size:.86rem">${p.name}</strong>
          ${p.email ? `<br><span style="font-size:.72rem;color:var(--muted)">${p.email}</span>` : ''}</td>
      <td>${p.nutritionist_short || p.nutritionist_name || '—'}</td>
      <td><span class="badge ${statusCls}">${p.clinical_status}</span></td>
      <td style="font-size:.78rem">${p.product}</td>
      <td style="font-size:.78rem">${p.start_date ? new Date(p.start_date+'T12:00:00').toLocaleDateString('pt-BR') : '—'}</td>
      <td>${p.jornada_slug ? `<a class="link" href="/jornada/${p.jornada_slug}" target="_blank">Ver jornada</a>` : '—'}</td>
      <td><button class="btn-sm" onclick="window.location='/paciente/${p.id}'">Abrir</button></td>`;
    tbody.appendChild(tr);
  });
}

// ── Modal novo paciente ───────────────────────────────────────
document.getElementById('btnNew').addEventListener('click', () => {
  ['pName','pEmail','pPhone','pWebdiet'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pBirthday').value = '';
  document.getElementById('pStartDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('pErr').style.display = 'none';
  document.getElementById('overlayNew').classList.add('open');
});
document.getElementById('btnCloseNew').addEventListener('click', () => document.getElementById('overlayNew').classList.remove('open'));
document.getElementById('btnCancelNew').addEventListener('click', () => document.getElementById('overlayNew').classList.remove('open'));

document.getElementById('btnSaveNew').addEventListener('click', async () => {
  const name = document.getElementById('pName').value.trim();
  const errEl = document.getElementById('pErr');
  if (!name) { errEl.textContent='Nome é obrigatório.'; errEl.style.display='block'; return; }
  errEl.style.display='none';
  const btn = document.getElementById('btnSaveNew');
  btn.textContent = 'Salvando…';
  const r = await fetch('/api/patients', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      email:          document.getElementById('pEmail').value    || null,
      phone:          document.getElementById('pPhone').value    || null,
      birthday:       document.getElementById('pBirthday').value || null,
      start_date:     document.getElementById('pStartDate').value|| null,
      nutritionist_id:document.getElementById('pNutri').value   || null,
      clinical_status:document.getElementById('pStatus').value,
      product:        document.getElementById('pProduct').value,
      webdiet_link:   document.getElementById('pWebdiet').value  || null,
    })
  });
  const data = await r.json();
  if (r.ok) {
    document.getElementById('overlayNew').classList.remove('open');
    window.location = `/paciente/${data.data.id}`;
  } else {
    errEl.textContent = data.error || 'Erro ao salvar.';
    errEl.style.display = 'block';
  }
  btn.textContent = 'Salvar';
});

// ── Filtros ───────────────────────────────────────────────────
['fNutri','fStatus','fProduct'].forEach(id =>
  document.getElementById(id).addEventListener('change', loadPatients));
document.getElementById('fSearch').addEventListener('input', () => {
  clearTimeout(timer); timer = setTimeout(loadPatients, 350);
});

document.getElementById('btnLogout').addEventListener('click', async () => {
  await fetch('/auth/logout',{method:'POST'}); window.location='/login';
});

(async () => {
  const r = await fetch('/api/me');
  me = await r.json();
  buildNav(me.role);
  await loadNutris();
  loadPatients();
})();
</script>
</body>
</html>
