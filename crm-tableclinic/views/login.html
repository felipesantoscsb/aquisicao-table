<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Table Clinic · CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --moss: #3D4A35; --terra: #B97040; --cream: #F8F4EE;
      --brown: #2C2018; --muted: #7A6E64; --line: #DDD4C4;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brown);
    }
    .card {
      background: #fff;
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 24px rgba(44,32,24,0.08);
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--moss);
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .brand__sub {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terra);
      margin-top: 4px;
    }
    .divider {
      height: 1px;
      background: var(--terra);
      opacity: 0.35;
      margin: 20px 0 32px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 11px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      color: var(--brown);
      background: var(--cream);
      outline: none;
      transition: border-color .2s;
      margin-bottom: 20px;
    }
    input:focus { border-color: var(--moss); }
    button {
      width: 100%;
      background: var(--moss);
      color: var(--cream);
      border: none;
      border-radius: 3px;
      padding: 13px;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }
    button:hover { background: #4E5E42; }
    .error {
      color: #c0392b;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand__title">Table Clinic</div>
      <div class="brand__sub">CRM Interno</div>
    </div>
    <div class="divider"></div>
    <form id="loginForm">
      <label>E-mail</label>
      <input type="email" id="email" required autocomplete="email" placeholder="seu@email.com.br"/>
      <label>Senha</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••"/>
      <button type="submit" id="btn">Entrar</button>
      <div class="error" id="err">Credenciais inválidas. Tente novamente.</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.textContent = 'Entrando...';
      btn.disabled = true;
      const err = document.getElementById('err');
      err.style.display = 'none';
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await r.json();
        if (r.ok) {
          window.location.href = '/pipeline';
        } else {
          err.style.display = 'block';
          btn.textContent = 'Entrar';
          btn.disabled = false;
        }
      } catch {
        err.style.display = 'block';
        btn.textContent = 'Entrar';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
