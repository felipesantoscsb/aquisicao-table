<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No ar 🚀</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      padding: 48px 40px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 12px #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    h1 { font-size: 28px; margin-bottom: 12px; font-weight: 600; }
    p { color: #cbd5e1; line-height: 1.6; font-size: 15px; }
    .tag {
      display: inline-block;
      margin-top: 28px;
      padding: 8px 16px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 999px;
      font-size: 13px;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status"><span class="dot"></span>Serviço no ar</div>
    <h1>Deploy funcionando 🚀</h1>
    <p>Esta é a base inicial do projeto. A estrutura completa (Express + CAPI) será montada via Claude Code.</p>
    <div class="tag">Railway · Node ready</div>
  </div>
</body>
</html>
